apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-chat
  namespace: azureai2
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: gpt4-deployment
  updatePolicy:
    updateMode: "Auto"  # Let VPA evict pods automatically
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 10m
        memory: 32Mi
      maxAllowed:
        cpu: "2"
        memory: 2Gi
